name: Tim2Tox Auto Tests (PR)

# Tier 2 (PR-blocking): runs the tim2tox auto_tests scenario suite in
# virtual-clock mode (RUN_VIRTUAL=1) so every PR gets fast, deterministic
# feedback. Wall-clock + real-network coverage lives in the nightly and
# full-matrix workflows.
#
# Scope: phases 1-8, 10, 12-14. ~30 min wall-time budget.
#   - Phase 5  (ToxAV)        included now that build_tim2tox.sh ships TOXAV=ON via --toxav.
#   - Phase 9  (conference)   excluded — known flake under CI clock.
#   - Phase 11 (network/DHT)  excluded — depends on real network.
#
# Trigger: PRs + pushes to main/master only. Ubuntu only to keep cost low.

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

defaults:
  run:
    shell: bash

permissions:
  contents: read

jobs:
  auto-tests-virtual:
    name: auto_tests (virtual, phases 1-8,10,12-14)
    runs-on: ubuntu-24.04
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'
          cache: true

      - name: Install Linux native dependencies
        # libsqlite3-dev: V2TIMCommunityManagerImpl links sqlite3 on non-Windows
        # builds; without it libtim2tox_ffi.so dies at dlopen with "undefined
        # symbol: sqlite3_open".
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            libsodium-dev \
            libopus-dev \
            libvpx-dev \
            libsqlite3-dev

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install toxee Flutter packages
        run: flutter pub get

      - name: Build libtim2tox_ffi.so (Linux, toxav + DHT bootstrap)
        run: bash tool/ci/build_tim2tox.sh --target linux --mode release --toxav --dht-bootstrap

      - name: Stage libtim2tox_ffi.so for runtime loader
        id: stage_lib
        run: |
          set -euo pipefail
          src_dir="$GITHUB_WORKSPACE/build/native-artifacts/linux"
          if [[ ! -f "$src_dir/libtim2tox_ffi.so" ]]; then
            echo "::error::libtim2tox_ffi.so not found under $src_dir"
            ls -la "$src_dir" || true
            exit 1
          fi
          # Tim2ToxFfi._openLinux() falls back to DynamicLibrary.open('libtim2tox_ffi.so'),
          # which honours LD_LIBRARY_PATH. Export it for subsequent steps.
          echo "LD_LIBRARY_PATH=$src_dir${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"
          echo "lib_dir=$src_dir" >> "$GITHUB_OUTPUT"

      - name: Install auto_tests Flutter packages
        working-directory: third_party/tim2tox/auto_tests
        run: flutter pub get

      - name: Run auto_tests (RUN_VIRTUAL=1, phases 1-8,10,12-14)
        working-directory: third_party/tim2tox/auto_tests
        env:
          RUN_VIRTUAL: '1'
          RETRY_COUNT: '1'
          # Skip the in-script `flutter pub get` since we just ran it above.
          SKIP_PUB_GET: 'auto'
        run: |
          chmod +x ./run_tests_ordered.sh
          ./run_tests_ordered.sh 1-8 10 12-14

      - name: Upload test logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: auto-tests-virtual-logs
          if-no-files-found: warn
          path: |
            third_party/tim2tox/auto_tests/test_results_*.log
            third_party/tim2tox/auto_tests/test_summary_*.txt
            third_party/tim2tox/auto_tests/merged_results/
