name: Build Packages

on:
  push:
    branches:
      - main
      - master
    tags:
      - "v*"
  pull_request:
  workflow_dispatch:
    inputs:
      publish_release:
        description: "Publish downloaded build artifacts to GitHub Releases"
        required: false
        default: false
        type: boolean
      release_tag:
        description: "Release tag to publish when manually triggering"
        required: false
        default: ""
        type: string
      prerelease:
        description: "Mark the GitHub Release as a prerelease"
        required: false
        default: false
        type: boolean

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  BUILD_MODE: release
  FLUTTER_VERSION: 3.29.0

jobs:
  linux:
    name: Linux ${{ matrix.target.package_arch }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - runner: ubuntu-24.04
            package_arch: x86_64
            flutter_setup: action
          - runner: ubuntu-24.04-arm
            package_arch: aarch64
            flutter_setup: manual

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Flutter
        if: matrix.target.flutter_setup == 'action'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up Flutter (manual ARM)
        if: matrix.target.flutter_setup == 'manual'
        run: |
          set -x
          # Flutter's CLI hardcodes `git rev-parse origin/master` paths during
          # engine-version detection regardless of channel, so cloning only
          # stable yields "fatal: Not a valid object name origin/master".
          # Strategy: clone stable (so origin/stable + branch tracking config
          # exist), additionally fetch master into refs/remotes/origin/master,
          # then fetch + checkout the pinned version tag. Use `git -C` instead
          # of a subshell — a `(cd ...; ...)` subshell here was mysteriously
          # propagating exit code 1 to the parent even though every command
          # inside succeeded.
          FLUTTER_DIR="$RUNNER_TEMP/flutter"
          git clone --depth 1 --branch stable \
            https://github.com/flutter/flutter.git "$FLUTTER_DIR"
          git -C "$FLUTTER_DIR" fetch --depth 1 origin master:refs/remotes/origin/master
          git -C "$FLUTTER_DIR" fetch --depth 1 origin "refs/tags/${FLUTTER_VERSION}:refs/tags/${FLUTTER_VERSION}"
          git -C "$FLUTTER_DIR" -c advice.detachedHead=false checkout "${FLUTTER_VERSION}"
          echo "$FLUTTER_DIR/bin" >> "$GITHUB_PATH"
          "$FLUTTER_DIR/bin/flutter" config --no-analytics
          "$FLUTTER_DIR/bin/flutter" precache --linux
          "$FLUTTER_DIR/bin/flutter" --version

      - name: Install Linux dependencies
        # ports.ubuntu.com is occasionally flaky from the ARM runners; retry
        # a few times with backoff before giving up.
        run: |
          set -e
          packages=(
            build-essential
            cmake
            libgtk-3-dev
            libsodium-dev
            libsqlite3-dev
            libgstreamer1.0-dev
            libgstreamer-plugins-base1.0-dev
            libsecret-1-dev
            libayatana-appindicator3-dev
            gstreamer1.0-plugins-base
            gstreamer1.0-plugins-good
            ninja-build
            patchelf
            pkg-config
            rpm
          )
          for attempt in 1 2 3 4 5; do
            if sudo apt-get update && sudo apt-get install -y "${packages[@]}"; then
              exit 0
            fi
            echo "apt-get attempt $attempt failed; retrying in $((attempt * 20))s" >&2
            sleep $((attempt * 20))
          done
          echo "apt-get install failed after 5 attempts" >&2
          exit 1

      - name: Enable Linux desktop
        run: flutter config --enable-linux-desktop

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install Flutter packages
        run: flutter pub get

      - name: Fix desktop_drop_for_t Linux plugin naming
        run: |
          # desktop_drop_for_t is a fork of desktop_drop but its Linux plugin
          # files still use the old names. Fix the CMake target name and create
          # a symlink so the generated #include <desktop_drop_for_t/...> resolves.
          PLUGIN_DIR="linux/flutter/ephemeral/.plugin_symlinks/desktop_drop_for_t/linux"
          if [ -f "$PLUGIN_DIR/CMakeLists.txt" ]; then
            sed -i 's/set(PLUGIN_NAME "desktop_drop_plugin")/set(PLUGIN_NAME "desktop_drop_for_t_plugin")/' "$PLUGIN_DIR/CMakeLists.txt"
            sed -i 's/set(desktop_drop_bundled_libraries/set(desktop_drop_for_t_bundled_libraries/' "$PLUGIN_DIR/CMakeLists.txt"
            # Header lives under include/desktop_drop/ but registrant expects desktop_drop_for_t/
            if [ -d "$PLUGIN_DIR/include/desktop_drop" ] && [ ! -d "$PLUGIN_DIR/include/desktop_drop_for_t" ]; then
              ln -s desktop_drop "$PLUGIN_DIR/include/desktop_drop_for_t"
            fi
          fi

      - name: Build Tim2Tox native library
        run: bash tool/ci/build_tim2tox.sh --target linux --mode "$BUILD_MODE"

      - name: Build Linux bundle
        run: flutter build linux --release --dart-define=FLUTTER_BUILD_MODE="$BUILD_MODE"

      - name: Package Linux artifacts
        env:
          TOXEE_PACKAGE_ARCH: ${{ matrix.target.package_arch }}
        run: bash tool/ci/package_artifacts.sh --target linux --mode "$BUILD_MODE"

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toxee-linux-${{ matrix.target.package_arch }}-release
          path: dist/linux
          if-no-files-found: error

  windows:
    name: Windows ${{ matrix.target.package_arch }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - runner: windows-2025
            package_arch: AMD64
            vcpkg_triplet: x64-windows
            cmake_arch: x64
            msvc_arch: amd64
            tim2tox_windows_arch: x64
            flutter_setup: action
          - runner: windows-11-arm
            package_arch: ARM64
            vcpkg_triplet: arm64-windows
            cmake_arch: ARM64
            msvc_arch: arm64
            tim2tox_windows_arch: arm64
            flutter_setup: manual

    steps:
      - name: Configure Git line endings
        run: |
          git config --global core.autocrlf false
          git config --global core.eol lf

      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Flutter
        if: matrix.target.flutter_setup == 'action'
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Set up Flutter (manual ARM)
        if: matrix.target.flutter_setup == 'manual'
        shell: pwsh
        run: |
          # Flutter's CLI hardcodes `git rev-parse origin/master` paths during
          # engine-version detection regardless of channel, so cloning only
          # stable yields "fatal: Not a valid object name origin/master".
          # Strategy: clone stable (so origin/stable + branch tracking config
          # exist), additionally fetch master into refs/remotes/origin/master,
          # then fetch + checkout the pinned version tag.
          $FlutterDir = "$env:RUNNER_TEMP\flutter"
          git clone --depth 1 --branch stable `
            https://github.com/flutter/flutter.git $FlutterDir
          git -C $FlutterDir fetch --depth 1 origin master:refs/remotes/origin/master
          git -C $FlutterDir fetch --depth 1 origin "refs/tags/$($env:FLUTTER_VERSION):refs/tags/$($env:FLUTTER_VERSION)"
          git -C $FlutterDir -c advice.detachedHead=false checkout $env:FLUTTER_VERSION
          "$FlutterDir\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$FlutterDir\bin\flutter.bat" config --no-analytics
          & "$FlutterDir\bin\flutter.bat" precache --windows
          & "$FlutterDir\bin\flutter.bat" --version

      - name: Install vcpkg and native dependencies
        shell: pwsh
        run: |
          $vcpkgRoot = Join-Path $env:RUNNER_TEMP "vcpkg"
          git clone --depth 1 https://github.com/microsoft/vcpkg $vcpkgRoot
          & "$vcpkgRoot\bootstrap-vcpkg.bat" -disableMetrics
          # pkgconf gives us pkg-config.exe under tools/pkgconf/, which
          # c-toxcore's cmake/Dependencies.cmake requires via find_package(PkgConfig).
          & "$vcpkgRoot\vcpkg.exe" install `
            libsodium:${{ matrix.target.vcpkg_triplet }} `
            pthreads:${{ matrix.target.vcpkg_triplet }} `
            pkgconf:${{ matrix.target.vcpkg_triplet }}
          "VCPKG_ROOT=$vcpkgRoot" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

      - name: Add WiX to PATH
        shell: pwsh
        run: |
          # WiX v3 may land in any of several places depending on whether the
          # runner image preinstalled it, whether choco was used, or whether a
          # vendored archive ended up under ProgramData. Scan all of them, and
          # fall back to a direct GitHub release download if the package
          # manager refuses to cooperate.
          function Find-WixBin {
            $patterns = @(
              "C:\Program Files (x86)\WiX Toolset v3.*\bin",
              "C:\Program Files\WiX Toolset v3.*\bin",
              "C:\ProgramData\chocolatey\lib\wixtoolset\tools\*\bin",
              "C:\ProgramData\chocolatey\lib\wixtoolset\tools\bin",
              "$env:RUNNER_TEMP\wix\*\bin",
              "$env:RUNNER_TEMP\wix\bin"
            )
            foreach ($p in $patterns) {
              $hit = Get-ChildItem -Path $p -ErrorAction SilentlyContinue |
                     Where-Object { Test-Path (Join-Path $_.FullName "candle.exe") } |
                     Select-Object -First 1
              if ($hit) { return $hit.FullName }
              if (Test-Path (Join-Path $p "candle.exe")) { return $p }
            }
            return $null
          }

          $wixDir = Find-WixBin
          if (-not $wixDir) {
            Write-Host "Installing WiX via Chocolatey..."
            choco install wixtoolset --yes --no-progress --version 3.14.1 2>&1 | Write-Host
            $wixDir = Find-WixBin
          }
          if (-not $wixDir) {
            Write-Host "Chocolatey path empty; downloading WiX v3.14 release directly..."
            $wixZip = Join-Path $env:RUNNER_TEMP "wix314-binaries.zip"
            $wixOut = Join-Path $env:RUNNER_TEMP "wix"
            Invoke-WebRequest `
              -Uri "https://github.com/wixtoolset/wix3/releases/download/wix3141rtm/wix314-binaries.zip" `
              -OutFile $wixZip -UseBasicParsing
            Expand-Archive -Path $wixZip -DestinationPath $wixOut -Force
            if (Test-Path (Join-Path $wixOut "candle.exe")) {
              $wixDir = $wixOut
            } else {
              $wixDir = Find-WixBin
            }
          }

          if (-not $wixDir) {
            Write-Error "WiX Toolset v3 was not found after installation."
            exit 1
          }

          Write-Host "Using WiX at: $wixDir"
          echo "$wixDir" >> $env:GITHUB_PATH

      - name: Enable Windows desktop
        run: flutter config --enable-windows-desktop

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install Flutter packages
        run: flutter pub get

      # CMake's "Visual Studio 17 2022" generator on the windows-2025 /
      # windows-11-arm images needs `vswhere`-discoverable VS state. The
      # ilammy/msvc-dev-cmd action sets INCLUDE/LIB/PATH/VSINSTALLDIR via
      # vcvarsall.bat so cmake's `project()` can find the toolchain.
      - name: Set up MSVC developer environment
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: ${{ matrix.target.msvc_arch }}

      - name: Build Tim2Tox native library
        env:
          TIM2TOX_WINDOWS_ARCH: ${{ matrix.target.tim2tox_windows_arch }}
          # ilammy/msvc-dev-cmd@v1's vcvars setup leaks VS18's bundled vcpkg
          # path into $env:VCPKG_ROOT, which has no libsodium / pkgconf
          # installed. Re-pin to the vcpkg we provisioned ourselves.
          VCPKG_ROOT: ${{ runner.temp }}/vcpkg
        run: bash tool/ci/build_tim2tox.sh --target windows --mode "$BUILD_MODE"

      - name: Build Windows runner
        run: flutter build windows --release --dart-define=FLUTTER_BUILD_MODE="$BUILD_MODE"

      - name: Package Windows artifacts
        env:
          TOXEE_PACKAGE_ARCH: ${{ matrix.target.package_arch }}
        run: bash tool/ci/package_artifacts.sh --target windows --mode "$BUILD_MODE"

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toxee-windows-${{ matrix.target.package_arch }}-release
          path: dist/windows
          if-no-files-found: error

  macos:
    name: macOS ${{ matrix.target.package_arch }}
    runs-on: ${{ matrix.target.runner }}
    strategy:
      fail-fast: false
      matrix:
        target:
          - runner: macos-15-intel
            package_arch: x86_64
          - runner: macos-15
            package_arch: arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install macOS dependencies
        run: brew install libsodium

      - name: Enable macOS desktop
        run: flutter config --enable-macos-desktop

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install Flutter packages
        run: flutter pub get

      - name: Build Tim2Tox native library
        run: bash tool/ci/build_tim2tox.sh --target macos --mode "$BUILD_MODE"

      - name: Build macOS app
        run: flutter build macos --release --dart-define=FLUTTER_BUILD_MODE="$BUILD_MODE"

      - name: Package macOS artifacts
        env:
          TOXEE_PACKAGE_ARCH: ${{ matrix.target.package_arch }}
        run: bash tool/ci/package_artifacts.sh --target macos --mode "$BUILD_MODE"

      - name: Upload macOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toxee-macos-${{ matrix.target.package_arch }}-release
          path: dist/macos
          if-no-files-found: error

  android:
    name: Android
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Enable Android support
        run: flutter config --enable-android

      - name: Install Android native build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake pkg-config

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install Flutter packages
        run: flutter pub get

      - name: Prepare Android signing
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          if [[ -n "$ANDROID_KEYSTORE_BASE64" && -n "$ANDROID_KEYSTORE_PASSWORD" && -n "$ANDROID_KEY_ALIAS" && -n "$ANDROID_KEY_PASSWORD" ]]; then
            echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/toxee-release.keystore"
            printf 'storeFile=%s\nstorePassword=%s\nkeyAlias=%s\nkeyPassword=%s\n' \
              "$RUNNER_TEMP/toxee-release.keystore" \
              "$ANDROID_KEYSTORE_PASSWORD" \
              "$ANDROID_KEY_ALIAS" \
              "$ANDROID_KEY_PASSWORD" \
              > android/key.properties
          fi

      - name: Stage optional Android Tim2Tox JNI libs
        env:
          TIM2TOX_ANDROID_ABIS: arm64-v8a
        run: bash tool/ci/build_tim2tox.sh --target android --mode "$BUILD_MODE"

      - name: Build Android APK
        run: flutter build apk --release --target-platform android-arm64 --dart-define=FLUTTER_BUILD_MODE="$BUILD_MODE"

      - name: Build Android App Bundle
        run: flutter build appbundle --release --target-platform android-arm64 --dart-define=FLUTTER_BUILD_MODE="$BUILD_MODE"

      - name: Package Android artifacts
        run: bash tool/ci/package_artifacts.sh --target android --mode "$BUILD_MODE"

      - name: Upload Android artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toxee-android-release
          path: dist/android
          if-no-files-found: error

  ios:
    name: iOS
    runs-on: macos-14

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          submodules: recursive

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          cache: true

      - name: Install macOS dependencies
        run: brew install libsodium coreutils yasm

      - name: Enable iOS support
        run: flutter config --enable-ios

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install Flutter packages
        run: flutter pub get

      - name: Install CocoaPods
        # The committed Podfile.lock pins TXIMSDK_Plus_iOS_XCFramework to the
        # older Tencent SDK; whenever third_party/tim2tox bumps the SDK version
        # the lock goes stale and `pod install` rejects the resolution. Delete
        # the lock so CocoaPods regenerates it from the current Podfile + the
        # vendored SDK, and pull the latest spec repo while we're at it.
        run: |
          cd ios
          rm -f Podfile.lock
          pod install --repo-update

      - name: Prepare iOS signing
        env:
          IOS_CERTIFICATE_P12_BASE64: ${{ secrets.IOS_CERTIFICATE_P12_BASE64 }}
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISIONING_PROFILE_BASE64: ${{ secrets.IOS_PROVISIONING_PROFILE_BASE64 }}
          IOS_KEYCHAIN_PASSWORD: ${{ secrets.IOS_KEYCHAIN_PASSWORD }}
          IOS_SIGNING_IDENTITY: ${{ secrets.IOS_SIGNING_IDENTITY }}
        run: |
          if [[ -n "$IOS_CERTIFICATE_P12_BASE64" && -n "$IOS_CERTIFICATE_PASSWORD" && -n "$IOS_PROVISIONING_PROFILE_BASE64" ]]; then
            bash tool/ci/prepare_ios_signing.sh
          fi

      - name: Stage optional iOS Tim2Tox artifacts
        run: bash tool/ci/build_tim2tox.sh --target ios --mode "$BUILD_MODE"

      - name: Build iOS app
        run: |
          if [[ "${IOS_SIGNING_READY:-false}" == "true" ]]; then
            flutter build ios --release --dart-define=FLUTTER_BUILD_MODE="$BUILD_MODE"
          else
            flutter build ios --release --no-codesign --dart-define=FLUTTER_BUILD_MODE="$BUILD_MODE"
          fi

      - name: Package iOS artifacts
        run: bash tool/ci/package_artifacts.sh --target ios --mode "$BUILD_MODE"

      - name: Upload iOS artifacts
        uses: actions/upload-artifact@v4
        with:
          name: toxee-ios-release
          path: dist/ios
          if-no-files-found: error

  publish:
    name: Publish GitHub Release
    runs-on: ubuntu-24.04
    needs:
      - linux
      - windows
      - macos
      - android
      - ios
    if: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && github.event.inputs.publish_release == 'true') }}
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Resolve release metadata
        id: release_meta
        run: |
          release_tag="${GITHUB_REF_NAME:-}"
          if [[ "${GITHUB_REF_TYPE:-}" != "tag" ]]; then
            release_tag="${{ github.event.inputs.release_tag }}"
          fi

          if [[ -z "$release_tag" ]]; then
            echo "release_tag input is required for manual publish." >&2
            exit 1
          fi

          echo "release_tag=$release_tag" >> "$GITHUB_OUTPUT"
          echo "prerelease=${{ github.event.inputs.prerelease || 'false' }}" >> "$GITHUB_OUTPUT"

      - name: Download packaged artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: toxee-*-release
          path: release-artifacts
          merge-multiple: false

      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.release_tag }}
          PRERELEASE: ${{ steps.release_meta.outputs.prerelease }}
          RELEASE_ARTIFACTS_DIR: ${{ github.workspace }}/release-artifacts
        run: bash tool/ci/publish_release.sh
