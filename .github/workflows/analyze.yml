name: Analyze

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.29.0'
          channel: 'stable'

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze (hard gate)
        run: flutter analyze lib tool --no-fatal-warnings --no-fatal-infos

      # Advisory pass: surfaces lint warnings/infos (e.g. prefer_final_locals)
      # without failing CI. Output is informational only — see F12 in the
      # 2026-05-20 batch-6 review for the path toward making this fatal.
      - name: Flutter analyze (advisory, warnings + infos)
        continue-on-error: true
        run: flutter analyze lib tool

      - name: Complexity guard
        run: dart run tool/check_complexity.dart

      # Advisory coverage baseline. continue-on-error because 2 known test
      # failures exist today; do not block PRs. TODO: once those are fixed,
      # flip continue-on-error off and introduce a minimum-coverage gate.
      - name: Flutter test with coverage (advisory)
        continue-on-error: true
        run: flutter test --coverage

      - name: Summarize lcov coverage
        continue-on-error: true
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "no coverage report"
            exit 0
          fi
          awk 'BEGIN { lh=0; lf=0 }
               /^LH:/ { lh += substr($0, 4) + 0 }
               /^LF:/ { lf += substr($0, 4) + 0 }
               END {
                 if (lf == 0) {
                   printf "lines hit: %d / lines found: 0 (no instrumented lines)\n", lh
                 } else {
                   printf "lines hit: %d / lines found: %d (%.2f%%)\n", lh, lf, (lh*100.0)/lf
                 }
               }' coverage/lcov.info

      - name: Upload coverage artifact
        if: ${{ hashFiles('coverage/lcov.info') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: toxee-coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore
