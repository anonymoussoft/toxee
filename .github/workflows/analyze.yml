name: Analyze

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  analyze:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Flutter analyze (hard gate)
        run: flutter analyze lib tool --no-fatal-warnings --no-fatal-infos

      # Advisory pass: surfaces lint warnings/infos (e.g. prefer_final_locals)
      # without failing CI. Output is informational only — see F12 in the
      # 2026-05-20 batch-6 review for the path toward making this fatal.
      - name: Flutter analyze (advisory, warnings + infos)
        continue-on-error: true
        run: flutter analyze lib tool

      - name: Complexity guard
        run: dart run tool/check_complexity.dart

  # Separate job so the fast lint/complexity gate above is never blocked by the
  # native build. The unit/widget suite constructs real FfiChatService
  # instances, whose constructor opens libtim2tox_ffi (Tim2ToxFfi.open) — so the
  # suite needs the native lib present on the Linux runner. Without it, every
  # FfiChatService-touching test throws at construction
  # ("Failed to load dynamic library 'libtim2tox_ffi.so'"). Same build + stage
  # recipe as the E2E workflow.
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.9'
          channel: 'stable'

      - name: Install Linux native dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            ninja-build \
            pkg-config \
            clang \
            libgtk-3-dev \
            liblzma-dev \
            libstdc++-12-dev \
            libsodium-dev \
            libopus-dev \
            libvpx-dev \
            libsqlite3-dev

      - name: Bootstrap dependencies
        run: dart run tool/bootstrap_deps.dart

      - name: Install dependencies
        run: flutter pub get

      - name: Build libtim2tox_ffi (Linux, debug + toxav)
        run: bash tool/ci/build_tim2tox.sh --target linux --mode debug --toxav

      - name: Stage libtim2tox_ffi.so for runtime loader
        run: |
          set -euo pipefail
          src_dir="$GITHUB_WORKSPACE/build/native-artifacts/linux"
          if [[ ! -f "$src_dir/libtim2tox_ffi.so" ]]; then
            echo "::error::libtim2tox_ffi.so not found under $src_dir"
            ls -la "$src_dir" || true
            exit 1
          fi
          echo "LD_LIBRARY_PATH=$src_dir${LD_LIBRARY_PATH:+:$LD_LIBRARY_PATH}" >> "$GITHUB_ENV"

      # Was advisory because the suite could not load libtim2tox_ffi on CI and
      # ~68 FfiChatService-touching tests threw at construction. With the lib
      # built + staged above they now run for real. Kept advisory for THIS
      # commit to confirm the suite is green on the Linux runner; flips to a
      # hard gate (continue-on-error removed) in the immediate follow-up.
      - name: Flutter test with coverage (advisory)
        continue-on-error: true
        run: flutter test --coverage

      - name: Summarize lcov coverage
        continue-on-error: true
        run: |
          if [ ! -f coverage/lcov.info ]; then
            echo "no coverage report"
            exit 0
          fi
          awk 'BEGIN { lh=0; lf=0 }
               /^LH:/ { lh += substr($0, 4) + 0 }
               /^LF:/ { lf += substr($0, 4) + 0 }
               END {
                 if (lf == 0) {
                   printf "lines hit: %d / lines found: 0 (no instrumented lines)\n", lh
                 } else {
                   printf "lines hit: %d / lines found: %d (%.2f%%)\n", lh, lf, (lh*100.0)/lf
                 }
               }' coverage/lcov.info

      - name: Upload coverage artifact
        if: ${{ hashFiles('coverage/lcov.info') != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: toxee-coverage-lcov
          path: coverage/lcov.info
          if-no-files-found: ignore
