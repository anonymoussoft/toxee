name: toxee
description: "toxee using FFI to tim2tox V2TIM APIs"
publish_to: "none"
version: 0.1.0+1
license: GPL-3.0
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  ffi: ^2.1.0
  tim2tox_dart: any
  tencent_cloud_chat_common: ^4.1.0+1
  tencent_cloud_chat_sdk: ^8.7.7201
  tencent_cloud_chat_message: ^4.1.0+3
  tencent_cloud_chat_sticker: ^4.1.0
  tencent_cloud_chat_conversation: ^4.1.0
  tencent_cloud_chat_contact: ^4.1.0
  tencent_cloud_chat_intl: ^4.1.0
  tencent_cloud_chat_text_translate: ^4.1.0
  tencent_cloud_chat_sound_to_text: ^4.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  file_picker: ^9.2.3
  path_provider: ^2.1.3
  path: ^1.8.3
  qr_flutter: ^4.1.0
  http: ^1.2.0
  tray_manager: ^0.2.0
  window_manager: ^0.3.8
  pasteboard: ^0.2.0
  image_clipboard: ^1.1.0+1
  crypto: ^3.0.3
  cryptography: ^2.7.0
  url_launcher: ^6.2.5
  archive: ^4.0.2
  record: ^5.1.0
  camera: ^0.11.0
  permission_handler: ^11.0.0
  flutter_pcm_sound: ^3.1.3
  audioplayers: ^5.2.0
  camera_macos: ^0.0.9
  wakelock_plus: ^1.3.3
dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.4
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256
dependency_overrides:
  record_linux: ^1.2.1
