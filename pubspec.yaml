name: toxee
description: "toxee using FFI to tim2tox V2TIM APIs"
publish_to: "none"
version: 0.1.0+1
license: GPL-3.0
environment:
  # mcp_toolkit ^3.0.0 requires Dart 3.11+. Without this floor, pub gives a
  # confusing dependency-resolution error instead of a clean SDK version error.
  sdk: ">=3.11.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: any
  ffi: ^2.1.0
  tim2tox_dart: any
  tencent_cloud_chat_common: ^4.1.0+1
  tencent_cloud_chat_sdk: ^8.9.7540+3
  tencent_cloud_chat_message: ^4.1.0+3
  tencent_cloud_chat_sticker: ^4.1.0
  tencent_cloud_chat_conversation: ^4.1.0
  tencent_cloud_chat_contact: ^4.1.0
  tencent_cloud_chat_intl: ^4.1.0
  tencent_cloud_chat_text_translate: ^4.1.0
  tencent_cloud_chat_sound_to_text: ^4.1.0
  provider: ^6.0.5
  shared_preferences: ^2.2.2
  flutter_secure_storage: ^9.2.2
  file_picker: ^9.2.3
  # OS-level app icon / dock unread badge. Full support on iOS + macOS (dock
  # tile badgeLabel), best-effort on Android (varies by launcher: Samsung,
  # Xiaomi, OEM/Pixel all implement ShortcutBadger-style counts differently).
  # No-op on Linux / Windows — the plugin's `isSupported()` guards calls so
  # we never throw on unsupported platforms. See
  # lib/notifications/badge_service.dart for the listener.
  app_badge_plus: ^1.2.10
  path_provider: ^2.1.3
  path: ^1.8.3
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.11
  http: ^1.2.0
  tray_manager: ^0.2.0
  window_manager: ^0.3.8
  pasteboard: ^0.2.0
  image_clipboard: ^1.1.0+1
  collection: ^1.18.0
  crypto: ^3.0.3
  cryptography: ^2.7.0
  url_launcher: ^6.2.5
  archive: ^4.0.2
  record: ^5.1.0
  camera: ^0.11.0
  permission_handler: ^11.0.0
  flutter_pcm_sound: ^3.1.3
  audioplayers: ^5.2.0
  camera_macos: ^0.0.9
  wakelock_plus: ^1.3.3
  # OS-level notifications for new incoming messages. Cross-platform: macOS &
  # iOS UNUserNotificationCenter, Android NotificationManager (channel +
  # grouping), Linux libnotify, Windows Toast / AUMID. See
  # lib/notifications/notification_service.dart for the entry point and
  # lib/notifications/notification_message_listener.dart for the listener that
  # drives showMessageNotification() off the V2TimAdvancedMsgListener path.
  flutter_local_notifications: ^17.2.4
  # Debug-only: MCP toolkit that exposes the running app to Claude Code via
  # the Dart VM service. Gated by kDebugMode in lib/main.dart so the call is
  # tree-shaken from profile/release builds.
  flutter_skill: ^0.9.36
  # Debug-only: marionette_flutter (LeanCode) — alternative Flutter MCP that
  # REPLACES WidgetsFlutterBinding with MarionetteBinding. Activated via
  # --dart-define=MCP_BINDING=marionette. See lib/main.dart for the switch
  # between flutter_skill and marionette (the two cannot coexist).
  marionette_flutter: ^0.5.0
  # Debug-only: mcp_toolkit (Arenukvern/mcp_flutter) — additive MCP layer that
  # does NOT install its own binding, so it can run alongside either
  # flutter_skill or marionette. Gated by kDebugMode in lib/main.dart.
  mcp_toolkit: ^3.0.0
dev_dependencies:
  flutter_test:
    sdk: flutter
  # Host-side PNG/asset generation for the product-screenshot seed pipeline
  # (tool/screenshots/). Kept DIRECT so the tool doesn't depend on the package
  # staying transitively resolvable (screenshots plan F13).
  image: ^4.8.0
  # Pairs with marionette_flutter — provides the `marionette_mcp` CLI that
  # Claude Code talks to over stdio (registered in ~/.claude.json).
  marionette_mcp: ^0.5.0
  # Provides the `integration_test` package so the smoke under
  # `integration_test/` can use `IntegrationTestWidgetsFlutterBinding` (the
  # current smoke uses `TestWidgetsFlutterBinding` for hermeticity — see
  # the header comment in `integration_test/app_smoke_test.dart` — but a
  # follow-up on-device smoke can opt into the integration binding without
  # re-doing the pubspec dance).
  integration_test:
    sdk: flutter
  flutter_lints: ^3.0.2
  flutter_launcher_icons: ^0.14.4
  msix: ^3.16.8
flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/
    - assets/avatars/
flutter_launcher_icons:
  image_path: "assets/app_icon.png"
  android: true
  ios: true
  macos:
    generate: true
    image_path: "assets/app_icon.png"
  windows:
    generate: true
    image_path: "assets/app_icon.png"
    icon_size: 256
dependency_overrides:
  record_linux: ^1.2.1

msix_config:
  display_name: Toxee
  publisher_display_name: Toxee Contributors
  identity_name: com.toxee.app
  msix_version: 0.1.0.0
  logo_path: assets/app_icon.png
  store: false
  capabilities: internetClient, microphone, webcam
